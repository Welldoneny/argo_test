# --- Redis ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: default 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis 
  namespace: default          
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# --- Server ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: default 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: my-server:latest
          imagePullPolicy: Never   # брать локальный образ, не пытаться пулить
          command: ["python", "-u", "./server.py"]
          startupProbe:              
            httpGet:
              path: /health/startup   
              port: 8080
            failureThreshold: 30       
            periodSeconds: 10          
          livenessProbe:               
            httpGet:
              path: /health/liveness   
              port: 8080
            initialDelaySeconds: 15    
            periodSeconds: 10          
          readinessProbe:              
            httpGet:
              path: /health/readiness  
              port: 8080
            periodSeconds: 5  
---
# --- Client ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: default 
spec:
  replicas: 3
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: my-client:latest
          imagePullPolicy: Never
          command: ["python", "-u", "./client.py"]
